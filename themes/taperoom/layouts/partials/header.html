<header class="site-header">
  <div class="container">
    <a href="{{ .Site.BaseURL }}" class="site-logo" aria-label="Home">Tate Eskew</a>

    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">menu</button>

    <nav class="site-nav" id="site-nav" aria-label="Main navigation">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>

    <div class="nav-controls">
      <button class="search-toggle" id="search-toggle" aria-label="Search site">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">Light</button>
    </div>
  </div>
</header>
