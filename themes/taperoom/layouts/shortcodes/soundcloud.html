{{- $id := .Get "id" -}}
{{- $height := .Get "height" | default "166" -}}
{{- $color := .Get "color" | default "c17f3a" -}}
{{- $secret := .Get "secret" -}}
<div class="embed-container">
  <iframe
    style="border: 0; width: 100%; height: {{ $height }}px;"
    src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/{{ $id }}{{ with $secret }}%3Fsecret_token%3D{{ . }}{{ end }}&color=%23{{ $color }}&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false"
    allow="autoplay"
    loading="lazy"
    title="SoundCloud Player">
  </iframe>
</div>
