{{- $album := .Get "album" -}}
{{- $track := .Get "track" -}}
{{- $size := .Get "size" | default "large" -}}
{{- if eq $size "small" -}}
<div class="embed-container">
  <iframe
    style="border: 0; width: 100%; max-width: 700px; height: 120px;"
    src="https://bandcamp.com/EmbeddedPlayer/{{ with $album }}album={{ . }}/{{ end }}{{ with $track }}track={{ . }}/{{ end }}size=small/bgcol=0e0e0d/linkcol=c17f3a/artwork=small/transparent=true/"
    seamless
    loading="lazy"
    title="Bandcamp Player">
  </iframe>
</div>
{{- else -}}
<div class="embed-container bandcamp-square">
  <iframe
    style="border: 0; width: 100%; height: 100%;"
    src="https://bandcamp.com/EmbeddedPlayer/{{ with $album }}album={{ . }}/{{ end }}{{ with $track }}track={{ . }}/{{ end }}size=large/bgcol=0e0e0d/linkcol=c17f3a/tracklist=false/transparent=true/"
    seamless
    loading="lazy"
    title="Bandcamp Player">
  </iframe>
</div>
{{- end -}}
